<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- iPadでのズームを防止し、アプリのように操作できるように設定 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>すうじタッチゲーム</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts (おもしろくて丸みのあるフォント) -->
  <link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@500;700&family=M+PLUS+Rounded+1c:wght@700;800;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'M PLUS Rounded 1c', 'Kiwi Maru', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }
    /* 3D風のボタン用シャドウ */
    .btn-shadow-orange {
      box-shadow: 0 8px 0 #c2410c;
    }
    .btn-shadow-orange:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #c2410c;
    }
    .btn-shadow-green {
      box-shadow: 0 8px 0 #15803d;
    }
    .btn-shadow-green:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #15803d;
    }
    /* 数字の浮き上がりアニメーション */
    @keyframes float {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-6px) rotate(2deg); }
    }
    .floating-number {
      animation: float 4s ease-in-out infinite;
    }
    /* シャボン玉背景 */
    .bubble {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      animation: floatUp 12s infinite linear;
      bottom: -100px;
      pointer-events: none;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
  </style>
</head>
<body class="bg-[#00c2e0] h-screen overflow-hidden flex flex-col items-center justify-center p-2 relative select-none">

  <!-- 背景のシャボン玉 (デコレーション) -->
  <div id="bubble-container" class="absolute inset-0 overflow-hidden pointer-events-none z-0"></div>

  <!-- メインコンテナ (iPadの画面比率に合わせた頑丈なカード) -->
  <div class="w-full max-w-xl h-[92vh] bg-[#00b4d8] rounded-[36px] border-8 border-white shadow-2xl flex flex-col overflow-hidden relative z-10">
    
    <!-- 1. スタート・設定画面 (初期状態) -->
    <div id="start-screen" class="flex-1 flex flex-col items-center justify-between p-6 z-10">
      <div class="text-center mt-6">
        <h1 class="text-4xl md:text-5xl text-white font-black tracking-wider drop-shadow-[0_4px_0_rgba(0,0,0,0.3)]">
          すうじタッチ！
        </h1>
        <p class="text-white text-lg mt-2 bg-sky-600 bg-opacity-40 px-4 py-1 rounded-full inline-block">
          じゅんばんに タップしよう！
        </p>
      </div>

      <!-- モード選択 (難易度) -->
      <div class="w-full max-w-sm bg-white bg-opacity-95 p-6 rounded-3xl shadow-lg border-4 border-amber-300">
        <h2 class="text-xl text-amber-700 font-extrabold text-center mb-4">🔢 どこまで あそぶ？</h2>
        <div class="grid grid-cols-1 gap-4">
          <button onclick="selectLevel(5)" id="btn-lvl-5" class="level-btn bg-amber-400 hover:bg-amber-500 text-white text-2xl font-black py-4 px-6 rounded-2xl border-b-8 border-amber-600 transition-all flex items-center justify-between">
            <span>⭐️ はじめて (1 〜 5)</span>
            <span class="bg-white text-amber-600 px-3 py-1 rounded-full text-sm">かんたん</span>
          </button>
          
          <button onclick="selectLevel(10)" id="btn-lvl-10" class="level-btn bg-emerald-400 hover:bg-emerald-500 text-white text-2xl font-black py-4 px-6 rounded-2xl border-b-8 border-emerald-600 transition-all flex items-center justify-between opacity-60">
            <span>🔥 がんばる (1 〜 10)</span>
            <span class="bg-white text-emerald-600 px-3 py-1 rounded-full text-sm">ふつう</span>
          </button>

          <button onclick="selectLevel(15)" id="btn-lvl-15" class="level-btn bg-indigo-400 hover:bg-indigo-500 text-white text-2xl font-black py-4 px-6 rounded-2xl border-b-8 border-indigo-600 transition-all flex items-center justify-between opacity-60">
            <span>🚀 チャレンジ (1 〜 15)</span>
            <span class="bg-white text-indigo-600 px-3 py-1 rounded-full text-sm">むずかしい</span>
          </button>
        </div>

        <!-- 音設定トグル -->
        <div class="flex items-center justify-between mt-6 pt-4 border-t border-gray-200">
          <span class="text-gray-600 font-bold">🔊 おとの おおきさ</span>
          <button onclick="toggleMute()" id="mute-btn" class="bg-sky-100 hover:bg-sky-200 text-sky-700 font-black px-4 py-2 rounded-xl text-md flex items-center gap-2">
            <span>🔊 おとON</span>
          </button>
        </div>
      </div>

      <!-- スタートボタン -->
      <button onclick="startGame()" class="w-full max-w-xs bg-orange-500 hover:bg-orange-400 text-white text-3xl font-black py-5 px-8 rounded-3xl btn-shadow-orange text-center transition-all tracking-widest mb-4">
        スタート！
      </button>
    </div>

    <!-- 2. ゲームプレイ画面 (非表示から開始) -->
    <div id="game-screen" class="hidden flex-1 flex flex-col justify-between p-3 relative z-10">
      
      <!-- ヘッダー情報 -->
      <div class="flex items-center justify-between bg-sky-100 bg-opacity-90 p-3 rounded-2xl border-4 border-white shadow-md">
        <!-- もどるボタン -->
        <button onclick="showStartScreen()" class="bg-amber-500 text-white p-2 rounded-xl font-bold text-sm shadow-md active:translate-y-0.5">
          🔙 もどる
        </button>

        <!-- ターゲット表示 (次の数字) -->
        <div class="text-center flex-1 mx-2">
          <span class="text-gray-500 text-xs font-bold block">つぎに タップする すうじ</span>
          <div class="flex justify-center items-center gap-1">
            <span id="next-number-target" class="text-5xl font-black text-rose-500 animate-bounce">1</span>
            <span class="text-gray-700 text-lg font-black">を タップ！</span>
          </div>
        </div>

        <!-- レベル表示 -->
        <div class="bg-sky-600 text-white px-3 py-1.5 rounded-xl text-center">
          <div class="text-[10px] opacity-90 font-bold">モード</div>
          <div id="game-mode-label" class="text-sm font-black">1〜5</div>
        </div>
      </div>

      <!-- タイマーゲージ -->
      <div class="mt-2 bg-white bg-opacity-80 p-1.5 rounded-full border-2 border-white flex items-center gap-2">
        <span class="text-xs font-black text-sky-700 shrink-0">⏰ じかん</span>
        <div class="w-full bg-sky-200 h-5 rounded-full overflow-hidden">
          <div id="timer-bar" class="bg-rose-500 h-full w-full rounded-full transition-all duration-100 ease-linear"></div>
        </div>
      </div>

      <!-- プレイスペース（白板） -->
      <div id="play-area" class="flex-1 bg-white rounded-[24px] border-4 border-white shadow-inner my-3 relative overflow-hidden">
        <!-- 数字たちがここに動的に配置されます -->
      </div>
    </div>

    <!-- 3. リザルト画面 (クリア・タイムアップ) -->
    <div id="result-screen" class="hidden flex-1 flex flex-col items-center justify-center p-6 z-10 text-center">
      <div id="result-emoji" class="text-8xl mb-4 animate-bounce">🎉</div>
      <h2 id="result-title" class="text-4xl text-white font-black mb-2 drop-shadow-md">できたー！</h2>
      <p id="result-sub" class="text-white text-lg mb-6 bg-sky-800 bg-opacity-40 px-6 py-2 rounded-full inline-block">
        よくがんばったね！
      </p>

      <!-- スコアボード -->
      <div class="bg-white p-6 rounded-3xl shadow-xl border-4 border-amber-300 w-full max-w-xs mb-8">
        <div class="text-gray-500 font-bold text-sm">タイム</div>
        <div id="result-time" class="text-5xl font-black text-orange-500 my-1">00.0びょう</div>
        <div class="text-xs text-gray-400 mt-2">（のこりじかん：<span id="result-remaining">0</span>びょう）</div>
      </div>

      <div class="flex flex-col gap-4 w-full max-w-xs">
        <button onclick="startGame()" class="bg-emerald-500 hover:bg-emerald-400 text-white text-2xl font-black py-4 px-6 rounded-2xl btn-shadow-green transition-all">
          もっかいあそぶ！
        </button>
        <button onclick="showStartScreen()" class="bg-sky-100 hover:bg-sky-200 text-sky-700 text-xl font-bold py-3 px-6 rounded-2xl transition-all">
          メニューにもどる
        </button>
      </div>
    </div>

  </div>

  <!-- キラキラエフェクトや紙吹雪用のキャンバス -->
  <canvas id="effect-canvas" class="absolute inset-0 pointer-events-none z-50"></canvas>

  <script>
    // --- ゲーム設定と状態 ---
    let currentMaxNumber = 5; // 現在の選択レベル (5, 10, 15)
    let nextToTap = 1;        // 次にタップすべき数字
    let timerMax = 60;        // 制限時間(秒)
    let timeLeft = 60;
    let timerInterval = null;
    let startTime = null;
    let gameActive = false;
    let isMuted = false;

    // カラフルな数字用カラーパレット (視認性が高く、かわいい色)
    const colorPalette = [
      { text: '#e11d48', bg: '#ffe4e6' }, // ローズ (赤系)
      { text: '#1e3a8a', bg: '#dbeafe' }, // ダークブルー
      { text: '#16a34a', bg: '#dcfce7' }, // グリーン
      { text: '#ea580c', bg: '#ffedd5' }, // オレンジ
      { text: '#9333ea', bg: '#f3e8ff' }, // パープル
      { text: '#0891b2', bg: '#ecfeff' }, // シアン
      { text: '#ca8a04', bg: '#fef9c3' }, // イエローゴールド
      { text: '#db2777', bg: '#fce7f3' }, // ピンク
      { text: '#4f46e5', bg: '#e0e7ff' }, // インディゴ
    ];

    // --- 音声生成 (Web Audio API) ---
    // 外部ファイル不要で音を鳴らす仕組み
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      if (isMuted) return;
      
      // iOS Safariのオーディオ再生制限解除用
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'correct') {
          // 正解音: ピキーン（さわやかで高いアルペジオ）
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(523.25, now); // ド (C5)
          osc.frequency.setValueAtTime(659.25, now + 0.08); // ミ (E5)
          osc.frequency.setValueAtTime(783.99, now + 0.16); // ソ (G5)
          osc.frequency.setValueAtTime(1046.50, now + 0.24); // ド (C6)
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
          osc.start(now);
          osc.stop(now + 0.5);
        } else if (type === 'wrong') {
          // 不正解音: ポヨッ（低めの少し抜けた音。子供を驚かせないマイルドなブー音）
          osc.type = 'sine';
          osc.frequency.setValueAtTime(220, now); // ラ (A3)
          osc.frequency.exponentialRampToValueAtTime(110, now + 0.3);
          gain.gain.setValueAtTime(0.4, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
          osc.start(now);
          osc.stop(now + 0.3);
        } else if (type === 'clear') {
          // ファンファーレ: タラッタラーン！
          const notes = [523.25, 659.25, 783.99, 1046.50];
          notes.forEach((freq, idx) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g);
            g.connect(audioCtx.destination);
            o.type = 'sine';
            o.frequency.value = freq;
            const noteStart = now + idx * 0.12;
            g.gain.setValueAtTime(0, now);
            g.gain.setValueAtTime(0.25, noteStart);
            g.gain.exponentialRampToValueAtTime(0.01, noteStart + 0.6);
            o.start(noteStart);
            o.stop(noteStart + 0.6);
          });
        } else if (type === 'timeup') {
          // タイムアップ: ピロピロピロ…
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(400, now);
          osc.frequency.linearRampToValueAtTime(200, now + 0.8);
          gain.gain.setValueAtTime(0.3, now);
          gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
          osc.start(now);
          osc.stop(now + 0.8);
        }
      } catch (e) {
        console.log('Audio Error:', e);
      }
    }

    // ミュート切り替え
    function toggleMute() {
      isMuted = !isMuted;
      const btn = document.getElementById('mute-btn');
      if (isMuted) {
        btn.innerHTML = '<span>🔇 おとOFF</span>';
        btn.className = 'bg-gray-200 text-gray-700 font-black px-4 py-2 rounded-xl text-md flex items-center gap-2';
      } else {
        btn.innerHTML = '<span>🔊 おとON</span>';
        btn.className = 'bg-sky-100 hover:bg-sky-200 text-sky-700 font-black px-4 py-2 rounded-xl text-md flex items-center gap-2';
        // 音声を有効化
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        playSound('correct');
      }
    }

    // --- シャボン玉デコレーション生成 ---
    function initBubbles() {
      const container = document.getElementById('bubble-container');
      container.innerHTML = '';
      const bubbleCount = 12;
      for (let i = 0; i < bubbleCount; i++) {
        createBubble(container);
      }
    }

    function createBubble(container) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = Math.random() * 60 + 20;
      b.style.width = `${size}px`;
      b.style.height = `${size}px`;
      b.style.left = `${Math.random() * 100}%`;
      b.style.animationDuration = `${Math.random() * 8 + 8}s`;
      b.style.animationDelay = `${Math.random() * -10}s`;
      container.appendChild(b);
    }

    // --- レベル(数字の最大値)切り替え ---
    function selectLevel(level) {
      currentMaxNumber = level;
      
      // ボタンの見た目更新
      document.querySelectorAll('.level-btn').forEach(btn => {
        btn.classList.add('opacity-60');
      });
      
      let selectedBtn = document.getElementById(`btn-lvl-${level}`);
      if (selectedBtn) {
        selectedBtn.classList.remove('opacity-60');
      }

      // レベルに応じた時間設定
      if (level === 5) {
        timerMax = 40; // 5個なら40秒でも十分
      } else if (level === 10) {
        timerMax = 60;
      } else {
        timerMax = 90;
      }
      
      playSound('correct');
    }

    // --- ゲーム切り替え画面制御 ---
    function showStartScreen() {
      gameActive = false;
      clearInterval(timerInterval);
      document.getElementById('start-screen').classList.remove('hidden');
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.add('hidden');
    }

    function showGameScreen() {
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.remove('hidden');
      document.getElementById('result-screen').classList.add('hidden');
    }

    function showResultScreen(isClear) {
      gameActive = false;
      clearInterval(timerInterval);
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('game-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');

      const emoji = document.getElementById('result-emoji');
      const title = document.getElementById('result-title');
      const sub = document.getElementById('result-sub');
      const timeVal = document.getElementById('result-time');
      const remainVal = document.getElementById('result-remaining');

      if (isClear) {
        const timeTaken = ((Date.now() - startTime) / 1000).toFixed(1);
        emoji.textContent = '🎉';
        title.textContent = 'できたーー！';
        title.className = 'text-4xl text-white font-black mb-2 drop-shadow-md';
        sub.textContent = 'ぜんぶみつけられたね！すごーい！';
        timeVal.textContent = `${timeTaken}びょう`;
        remainVal.textContent = Math.ceil(timeLeft);
        playSound('clear');
        startCelebration();
      } else {
        emoji.textContent = '⏰';
        title.textContent = 'タイムアップ！';
        title.className = 'text-4xl text-amber-200 font-black mb-2 drop-shadow-md';
        sub.textContent = 'つぎは もっと はやく できるかな？';
        timeVal.textContent = 'おしまい';
        remainVal.textContent = '0';
        playSound('timeup');
      }
    }

    // --- ゲームの初期化と開始 ---
    function startGame() {
      // オーディオコンテキストの有効化 (iPad対策)
      if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      showGameScreen();
      nextToTap = 1;
      timeLeft = timerMax;
      gameActive = true;
      startTime = Date.now();

      // UIの更新
      document.getElementById('next-number-target').textContent = nextToTap;
      document.getElementById('game-mode-label').textContent = `1 〜 ${currentMaxNumber}`;
      
      updateTimerUI();
      setupNumberBoard();

      // タイマースタート
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!gameActive) return;
        timeLeft -= 0.1;
        if (timeLeft <= 0) {
          timeLeft = 0;
          showResultScreen(false);
        }
        updateTimerUI();
      }, 100);

      playSound('correct');
    }

    // タイマーバーの更新
    function updateTimerUI() {
      const bar = document.getElementById('timer-bar');
      const percentage = (timeLeft / timerMax) * 100;
      bar.style.width = `${percentage}%`;

      // 時間が少なくなってきたらバーの色を赤にする
      if (percentage < 25) {
        bar.className = 'bg-rose-600 h-full w-full rounded-full transition-all duration-100 ease-linear';
      } else if (percentage < 50) {
        bar.className = 'bg-amber-500 h-full w-full rounded-full transition-all duration-100 ease-linear';
      } else {
        bar.className = 'bg-emerald-500 h-full w-full rounded-full transition-all duration-100 ease-linear';
      }
    }

    // --- 数字のグリッドランダム配置アルゴリズム ---
    function setupNumberBoard() {
      const playArea = document.getElementById('play-area');
      playArea.innerHTML = '';

      const width = playArea.clientWidth || 350;
      const height = playArea.clientHeight || 400;

      // 1から指定枚数までのリスト
      const numbers = Array.from({ length: currentMaxNumber }, (_, i) => i + 1);

      // グリッド分割による「重なり回避ランダム」
      // モードに合わせて最適な分割数にする
      let cols = 3;
      let rows = 2;

      if (currentMaxNumber <= 5) {
        cols = 3; rows = 2; // 3x2 = 6枠
      } else if (currentMaxNumber <= 10) {
        cols = 4; rows = 3; // 4x3 = 12枠
      } else {
        cols = 4; rows = 4; // 4x4 = 16枠
      }

      const totalCells = cols * rows;
      
      // グリッドセルの番号を生成し、シャッフル
      let cellIndices = Array.from({ length: totalCells }, (_, i) => i);
      cellIndices = shuffleArray(cellIndices);

      const cellWidth = width / cols;
      const cellHeight = height / rows;

      // 数字をそれぞれのセルに散りばめる
      numbers.forEach((num, index) => {
        const cellIdx = cellIndices[index];
        const cellCol = cellIdx % cols;
        const cellRow = Math.floor(cellIdx / cols);

        // セルの中でのランダムな偏り（マージンを持たせてはみ出さないように）
        const paddingX = cellWidth * 0.2;
        const paddingY = cellHeight * 0.2;
        const randomX = paddingX + Math.random() * (cellWidth - paddingX * 2 - 50); // 50はボタン幅目安
        const randomY = paddingY + Math.random() * (cellHeight - paddingY * 2 - 50);

        // 絶対位置
        const posX = cellCol * cellWidth + randomX;
        const posY = cellRow * cellHeight + randomY;

        // 数字ボタン要素作成
        const numBtn = document.createElement('button');
        numBtn.id = `num-btn-${num}`;
        numBtn.textContent = num;
        
        // 色を割り当て
        const color = colorPalette[(num - 1) % colorPalette.length];
        
        // iPad用の大きな文字サイズ設計
        numBtn.style.color = color.text;
        numBtn.style.backgroundColor = color.bg;
        numBtn.style.borderColor = color.text;
        
        // Tailwindのスタイルを付与。iPad向けにタッチフィードバック(active:)を強調
        numBtn.className = `absolute select-none font-extrabold rounded-3xl border-4 text-4xl md:text-5xl w-16 h-16 md:w-20 md:h-20 shadow-lg flex items-center justify-center transition-all duration-150 transform active:scale-95 active:shadow-sm floating-number cursor-pointer`;
        numBtn.style.left = `${posX}px`;
        numBtn.style.top = `${posY}px`;

        // 浮遊アニメーションのタイミングをバラバラにする
        numBtn.style.animationDelay = `${Math.random() * 2}s`;

        // タッチイベント設定 (iPadでの反応を良くするためにtouchstartイベントも監視)
        const handleTap = (e) => {
          e.preventDefault();
          onNumberTap(num);
        };
        numBtn.addEventListener('click', handleTap);
        numBtn.addEventListener('touchstart', handleTap);

        playArea.appendChild(numBtn);
      });
    }

    // 配列のシャッフル関数
    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // --- 数字がタップされた時の処理 ---
    function onNumberTap(num) {
      if (!gameActive) return;

      if (num === nextToTap) {
        // 【正解！】
        // キラキラアニメーション用座標を取得
        const btn = document.getElementById(`num-btn-${num}`);
        if (btn) {
          const rect = btn.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          createSparkles(centerX, centerY, btn.style.color);
          
          // 消去アニメーション
          btn.style.transform = 'scale(0)';
          btn.style.opacity = '0';
          setTimeout(() => btn.remove(), 200);
        }

        playSound('correct');
        
        nextToTap++;

        if (nextToTap > currentMaxNumber) {
          // すべてクリア！
          setTimeout(() => showResultScreen(true), 300);
        } else {
          // 次の数字を上に表示
          document.getElementById('next-number-target').textContent = nextToTap;
        }
      } else {
        // 【間違い！】
        const btn = document.getElementById(`num-btn-${num}`);
        if (btn) {
          // ぶるぶる揺れるアニメーション
          btn.classList.add('animate-shake');
          btn.style.transform = 'translateX(5px)';
          setTimeout(() => { btn.style.transform = ''; }, 100);
        }
        playSound('wrong');
      }
    }

    // --- キラキラ & クラッカーエフェクト (Canvas描画) ---
    const canvas = document.getElementById('effect-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
      constructor(x, y, color, type = 'star') {
        this.x = x;
        this.y = y;
        this.color = color;
        this.type = type;
        this.size = Math.random() * 12 + 6;
        this.speedX = (Math.random() - 0.5) * 8;
        this.speedY = (Math.random() - 0.5) * 8 - (type === 'confe' ? 4 : 0); // クラッカーは上に
        this.gravity = 0.2;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.1;
        this.opacity = 1;
        this.life = 1; // 寿命
        this.decay = Math.random() * 0.02 + 0.015;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.speedY += this.gravity;
        this.angle += this.spin;
        this.opacity -= this.decay;
        if (this.opacity < 0) this.opacity = 0;
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.globalAlpha = this.opacity;
        ctx.fillStyle = this.color;

        if (this.type === 'star') {
          // 星型を描画
          ctx.beginPath();
          for (let i = 0; i < 5; i++) {
            ctx.lineTo(Math.cos((18 + i * 72) * Math.PI / 180) * this.size,
                       -Math.sin((18 + i * 72) * Math.PI / 180) * this.size);
            ctx.lineTo(Math.cos((54 + i * 72) * Math.PI / 180) * (this.size / 2),
                       -Math.sin((54 + i * 72) * Math.PI / 180) * (this.size / 2));
          }
          ctx.closePath();
          ctx.fill();
        } else {
          // 紙吹雪 (丸や長方形)
          ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size/2);
        }
        ctx.restore();
      }
    }

    // 正解時のタップキラキラ
    function createSparkles(x, y, color) {
      for (let i = 0; i < 15; i++) {
        particles.push(new Particle(x, y, color, 'star'));
      }
    }

    // クリア時の大きなクラッカー
    function startCelebration() {
      const colors = ['#f43f5e', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
      // 左下と右下から大量に打ち上げる
      for (let i = 0; i < 40; i++) {
        particles.push(new Particle(100, window.innerHeight - 100, colors[Math.floor(Math.random() * colors.length)], 'confe'));
        particles.push(new Particle(window.innerWidth - 100, window.innerHeight - 100, colors[Math.floor(Math.random() * colors.length)], 'confe'));
      }
    }

    // 描画ループ
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach((p, index) => {
        p.update();
        p.draw();
        if (p.opacity <= 0) {
          particles.splice(index, 1);
        }
      });
      
      requestAnimationFrame(animate);
    }
    animate();

    // 読み込み時に背景シャボン玉を初期化
    window.onload = function() {
      initBubbles();
    };
  </script>
</body>
</html>
